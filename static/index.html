<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceBridgeAI</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/guide.css" />
</head>
<body>
  <main>
    <nav class="page-nav">
      <a href="/config">接口配置</a>
      <a href="/guide/provider-keys">密钥文档</a>
    </nav>
    <h1>VoiceBridgeAI</h1>
    <p class="page-tagline">Chrome 标签页英文音频 → 实时中英双语字幕</p>

    <details id="engine-settings" class="fold-panel settings" open>
      <summary class="fold-title">引擎设置</summary>
      <p class="hint engine-intro">
        默认可直接用本地 Whisper + Argos（句中/句末），无需 Key。
        句末也可选「不翻译」；云端推荐 <strong>句中 MT + 句末 LLM</strong>，见下方下拉分组；接口请先到 <a class="inline-link" href="/config">接口配置</a> 填写密钥并测试，再回来选择。
      </p>
      <label class="setting">
        <span>语音识别</span>
        <div class="setting-control">
          <select id="asr-mode"></select>
          <span class="hint-anchor">
            <button type="button" class="hint-trigger" id="asr-hint" aria-label="语音识别说明">?</button>
            <span class="hint-popover" id="asr-hint-pop" role="tooltip"></span>
          </span>
        </div>
      </label>
      <label class="setting">
        <span class="setting-label">
          句中翻译
          <small class="setting-recommend">推荐 MT</small>
        </span>
        <div class="setting-control">
          <select id="partial-provider"></select>
          <span class="hint-anchor">
            <button type="button" class="hint-trigger" id="translate-hint" aria-label="句中翻译说明">?</button>
            <span class="hint-popover" id="translate-hint-pop" role="tooltip"></span>
          </span>
        </div>
      </label>
      <label class="setting">
        <span class="setting-label">
          句末润色
          <small class="setting-recommend">推荐 LLM</small>
        </span>
        <div class="setting-control">
          <select id="final-provider"></select>
          <span class="hint-anchor">
            <button type="button" class="hint-trigger" id="final-hint" aria-label="句末润色说明">?</button>
            <span class="hint-popover" id="final-hint-pop" role="tooltip"></span>
          </span>
        </div>
      </label>
      <label class="setting">
        <span>纠正模式</span>
        <div class="setting-control">
          <select id="revise-mode"></select>
          <span class="hint-anchor">
            <button type="button" class="hint-trigger" id="revise-hint" aria-label="纠正模式说明">?</button>
            <span class="hint-popover" id="revise-hint-pop" role="tooltip"></span>
          </span>
        </div>
      </label>
      <p id="engine-settings-note" class="hint"></p>
    </details>

    <button type="button" id="capture">开始捕获</button>
    <p id="hint" class="hint capture-hint"></p>
    <p id="status" class="status-line">就绪</p>
    <ol id="segments" class="segments"></ol>
    <div id="health" class="health-panel" hidden></div>
  </main>
  <script src="/static/js/capture.js"></script>
  <script src="/static/js/engine-select.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
