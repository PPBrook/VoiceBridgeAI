<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceBridgeAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>VoiceBridgeAI</h1>
    <p id="server-status" class="status-pill">检测中…</p>
  </header>

  <section class="controls">
    <button type="button" id="btn-start" class="btn-primary">开始悬浮字幕</button>
    <button type="button" id="btn-stop" class="btn-secondary" hidden>停止</button>
  </section>

  <p id="hint" class="hint">在当前标签页捕获音频，字幕悬浮显示在视频上方。离线默认可用；云端请先在控制台测试通过。</p>
  <p id="error" class="error" hidden></p>

  <label class="server-url">
    服务端地址
    <input type="text" id="server-url" placeholder="http://127.0.0.1:8765" spellcheck="false" autocomplete="off" />
  </label>

  <fieldset class="settings">
    <legend>输入</legend>
    <label>
      英文来源
      <select id="input-mode">
        <option value="audio">语音识别（音频）</option>
        <option value="caption">YouTube 英文字幕</option>
      </select>
    </label>
    <p id="input-hint" class="input-hint"></p>
  </fieldset>

  <fieldset class="settings" id="engine-settings">
    <legend>引擎（与控制台同步）</legend>
    <label id="asr-label">
      语音识别
      <select id="asr-mode"></select>
    </label>
    <label>
      <span class="field-label">
        句中翻译
        <small class="field-recommend">推荐 MT</small>
      </span>
      <select id="partial-provider"></select>
    </label>
    <label>
      <span class="field-label">
        句末润色
        <small class="field-recommend">推荐 LLM</small>
      </span>
      <select id="final-provider"></select>
    </label>
    <label>
      纠正
      <select id="revise-mode">
        <option value="speed">实时优先</option>
        <option value="balanced" selected>标准纠正</option>
        <option value="accuracy">精准纠正</option>
      </select>
    </label>
  </fieldset>

  <footer class="popup-footer">
    <a id="open-console" href="http://127.0.0.1:8765" target="_blank" rel="noopener">控制台</a>
    <span class="footer-sep">·</span>
    <a id="open-config" href="http://127.0.0.1:8765/config" target="_blank" rel="noopener">接口配置</a>
  </footer>
  <script src="engine-select.js"></script>
  <script src="popup.js"></script>
</body>
</html>
