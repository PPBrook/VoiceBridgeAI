<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceBridgeAI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>VoiceBridgeAI</h1>
    <p id="server-status" class="status-pill">检测中…</p>
  </header>

  <section class="controls">
    <button type="button" id="btn-start" class="btn-primary">开始悬浮字幕</button>
    <button type="button" id="btn-stop" class="btn-secondary" hidden>停止</button>
  </section>

  <p id="hint" class="hint">在当前标签页捕获音频，字幕悬浮显示在视频上方。</p>
  <p id="error" class="error" hidden></p>

  <fieldset class="settings">
    <legend>引擎（与服务端一致）</legend>
    <label>
      语音识别
      <select id="asr-mode">
        <option value="tencent">腾讯云</option>
        <option value="local">本地 Whisper</option>
      </select>
    </label>
    <label>
      句中翻译
      <select id="partial-provider">
        <option value="tmt">腾讯 TMT</option>
        <option value="google">Google</option>
        <option value="argos">Argos 离线</option>
        <option value="aliyun">阿里云</option>
      </select>
    </label>
    <label>
      句末润色
      <select id="final-provider">
        <option value="qiniu">七牛 AI</option>
        <option value="aliyun">阿里云</option>
        <option value="tmt">腾讯 TMT</option>
        <option value="google">Google</option>
        <option value="argos">Argos 离线</option>
        <option value="none">不润色</option>
      </select>
    </label>
    <label>
      纠正
      <select id="revise-mode">
        <option value="speed">实时优先</option>
        <option value="balanced" selected>标准纠正</option>
        <option value="accuracy">精准纠正</option>
      </select>
    </label>
  </fieldset>

  <footer>
    <a id="open-console" href="http://127.0.0.1:8765" target="_blank" rel="noopener">打开控制台 · API 配置</a>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
